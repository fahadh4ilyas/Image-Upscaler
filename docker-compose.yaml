services:
  upscaler:
    build: .
    image: upscaler:latest
    container_name: upscaler-api
    ports:
      - "${API_PORT:-8123}:${API_PORT:-8123}"
    environment:
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8123}
      - WORKER_NUM=${WORKER_NUM:-2}
      - MODEL_PATH=${MODEL_PATH:-./models}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
